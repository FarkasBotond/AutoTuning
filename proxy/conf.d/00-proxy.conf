server {
    server_name vm1.test vm2.test vm3.test vm4.test vm5.test vm6.test localhost;
    listen 80 default_server;

    location /api {
        proxy_pass http://webserver:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 502 /502.html;
    }

    location / {
        default_type text/html;
        charset UTF8;
        return 200 '<html><body><h1>Proxy fut!</h1></body></html>';
    }

    location = /502.html {
        internal;
        default_type text/html;
        charset utf-8;
        return 502 '<html><body><h1>Fut a Webserver?</h1></body></html>';
    }
}
